        <h1 class="text-2xl font-black mb-8 text-slate-900">Step 05 - 06: SEOの本質と、無料vs有料</h1>
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8">
            <h2 class="font-bold text-lg mb-4">SEOの答えは「自己完結」</h2>
            <p class="mb-6 leading-loose">他のサイトに補足を探させない。1つのページで読者の悩みを完全に解決する。これこそが最強のSEOです。WordPressを使わなくても、Geminiと一緒に質の高い記事を書けば必ず上位表示は狙えます。</p>
            <h2 class="font-bold text-lg mb-4">無料 vs 有料のリアル</h2>
            <p class="leading-loose">無料（GitHub）は手作業ですが、お金は一切かかりません。一方、有料（WordPress）は維持費がかかりますが、SEO設定やリンクの管理をシステムが全自動でやってくれます。「お金を払って時間を買うか」の違いにすぎません。</p>
