        <h1 class="text-2xl font-black mb-8 text-slate-900">Step 03 - 04: GitHubとGeminiの融合</h1>
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8">
            <h2 class="font-bold text-lg mb-4">なぜ無料の「GitHub」なのか？</h2>
            <p class="mb-6 leading-loose">GitHub Pagesを使えば、表示速度が圧倒的に速く、セキュリティも最強のサイトが「無料」で持てます。最大の弱点であった「コードを手動で書く手間」は、AI（Gemini）の登場で完全に消滅しました。</p>
            <h2 class="font-bold text-lg mb-4 text-purple-600">最強の相棒「Gemini」</h2>
            <p class="leading-loose">Geminiに「リンクを追加して」「SEOタグを書いて」と指示し、出てきたコードをコピペするだけ。このスマホ1台の連携こそが、有料のシステムを凌駕する現代のハックです。</p>
        </div>
